
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Your Order</title>
</head>
<body>

<form action="#" method="post">

    <label for="name">Full Name:</label><br>
    <input type="text" id="name" name="name" required><br><br>

    <label for="phone">Phone Number:</label><br>
    <input type="tel" id="phone" name="phone" required><br><br>

    <label for="address">Address:</label><br>
    <textarea id="address" name="address" rows="3" required></textarea><br><br>

    <label for="dish">Select Dish:</label><br>
    <select id="dish" name="dish" required>
        <option value="">Choose a dish</option>
        <option value="spring_roll">Spring Roll - ₹120</option>
        <option value="paneer_tikka">Paneer Tikka - ₹180</option>
        <option value="tomato_soup">Tomato Soup - ₹120</option>
        <option value="green_salad">Green Salad - ₹120</option>
        <option value="dal_makhani">Dal Makhani - ₹220</option>
        <option value="curry">Curry - ₹250</option>
        <option value="jeera_rice">Jeera Rice - ₹120</option>
        <option value="cold_coffee">Cold Coffee - ₹120</option>
        <option value="mango_shake">Mango Shake - ₹120</option>
    </select><br><br>

    <label for="qty">Quantity:</label><br>
    <input type="number" id="qty" name="quantity" min="1" value="1" required><br><br>


    <label>Payment Method:</label><br>
    <input type="radio" name="payment" value="cash" required> Cash
    <input type="radio" name="payment" value="upi"> UPI
    <input type="radio" name="payment" value="card"> Card<br><br>

    <!-- Submit -->
    <button type="submit">Order</button>

</form>
    
</body>
</html>
